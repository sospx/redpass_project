<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redpass - Проверка паролей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
    <style>
        /* Небольшая анимация загрузки */
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-red-100 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

<div class="max-w-xl w-full space-y-8">
    <div class="text-center">
        <h1 class="text-4xl font-extrabold text-red-700 tracking-tight">Redpass</h1>
        <p class="mt-2 text-sm text-red-600">Узнай, насколько надежен твой пароль</p>
    </div>

    <div id="auth-section" class="bg-white p-8 rounded-xl shadow-lg space-y-6">
        <h2 class="text-xl font-bold text-center">Вход в систему</h2>
        <div id="auth-error" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm text-center"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email"
                       class="mt-1 block w-full px-3 py-2 border border-red-200 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500"
                       placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Пароль (от аккаунта)</label>
                <input type="password" id="password"
                       class="mt-1 block w-full px-3 py-2 border border-red-200 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500"
                       placeholder="••••••••">
            </div>
            <div class="flex space-x-4 pt-2">
                <button id="btn-login"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none">
                    Войти
                </button>
                <button id="btn-register"
                        class="w-full flex justify-center py-2 px-4 border border-red-600 rounded-md shadow-sm text-sm font-medium text-red-700 bg-white hover:bg-red-50 focus:outline-none">
                    Регистрация
                </button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden space-y-6">

        <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
            <span id="user-email-display" class="font-medium text-gray-700">user@mail.com</span>
            <button id="btn-logout" class="text-sm text-red-600 hover:underline">Выйти</button>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-lg space-y-4">
            <h2 class="text-xl font-bold">Проверка пароля</h2>
            <div class="flex space-x-2">
                <input type="text" id="check-password-input"
                       class="block w-full px-3 py-2 border border-red-200 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500"
                       placeholder="Введите пароль для проверки...">
                <button id="btn-check"
                        class="py-2 px-6 bg-red-600 hover:bg-red-700 text-white rounded-md font-medium shadow-sm transition-colors">
                    Проверить
                </button>
            </div>

            <div id="strength-preview" class="space-y-2">
                <div class="flex items-center justify-between text-xs text-gray-600">
                    <span>Предварительная стойкость</span>
                    <span id="strength-label">Начните вводить пароль</span>
                </div>
                <div class="h-2 w-full rounded-full bg-gray-200 overflow-hidden">
                    <div id="strength-bar" class="h-2 w-0 bg-gray-400 transition-all duration-200"></div>
                </div>
            </div>

            <div id="check-result" class="hidden mt-6 p-4 border rounded-lg bg-gray-50">
                <h3 class="font-bold mb-2">Результат:</h3>
                <p class="text-sm">Оценка: <span id="res-score" class="font-bold"></span> / 4</p>
                <p class="text-sm">Время взлома: <span id="res-time" class="font-bold"></span></p>
                <p class="text-sm mt-2 font-bold" id="res-leak"></p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">История проверок</h2>
                <div class="flex space-x-4">
                    <button id="btn-clear-history" class="text-sm text-gray-500 hover:text-red-600 transition-colors">
                        Очистить
                    </button>
                    <button id="btn-refresh-history" class="text-sm text-red-700 hover:underline transition-colors">
                        Обновить
                    </button>
                </div>
            </div>
            <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 rounded-lg">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Пароль
                        </th>
                        <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Оценка
                        </th>
                        <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Утечки
                        </th>
                    </tr>
                    </thead>
                    <tbody id="history-table-body" class="bg-white divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
